name: Execute Droplet Command

on:
  push:
    branches: [main]
    paths:
      - command.json

permissions:
  contents: write

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BRIDGE_TOKEN }}

      - name: Read command from command.json
        id: read_cmd
        run: |
          STATUS=$(jq -r '.status' command.json)
          COMMAND=$(jq -r '.command' command.json)
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "command=$COMMAND" >> $GITHUB_OUTPUT

      - name: Skip if not pending
        if: steps.read_cmd.outputs.status != 'pending'
        run: echo "Status is '${{ steps.read_cmd.outputs.status }}' — skipping."

      - name: Execute command on droplet via SSH
        if: steps.read_cmd.outputs.status == 'pending'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script_stop: false
          script: |
            eval '${{ steps.read_cmd.outputs.command }}' > /tmp/cmd_stdout.txt 2>/tmp/cmd_stderr.txt
            echo $? > /tmp/cmd_rc.txt

      - name: Retrieve output from droplet
        if: steps.read_cmd.outputs.status == 'pending'
        uses: appleboy/ssh-action@v1.0.3
        id: get_output
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            printf '%s' "$(cat /tmp/cmd_stdout.txt)" > /tmp/b64_stdout.txt
            printf '%s' "$(cat /tmp/cmd_stderr.txt)" > /tmp/b64_stderr.txt
            echo "STDOUT=$(base64 -w0 /tmp/cmd_stdout.txt)"
            echo "STDERR=$(base64 -w0 /tmp/cmd_stderr.txt)"
            echo "RC=$(cat /tmp/cmd_rc.txt | tr -d '[:space:]')"

      - name: Write result.json and mark done
        if: steps.read_cmd.outputs.status == 'pending'
        run: |
          # Extract base64-encoded fields from SSH output
          SSH_OUT='${{ steps.get_output.outputs.stdout }}'
          STDOUT_B64=$(echo "$SSH_OUT" | grep '^STDOUT=' | cut -d= -f2-)
          STDERR_B64=$(echo "$SSH_OUT" | grep '^STDERR=' | cut -d= -f2-)
          RC=$(echo "$SSH_OUT" | grep '^RC=' | cut -d= -f2 | tr -d '[:space:]')
          [ -z "$RC" ] && RC=0

          STDOUT=$(echo "$STDOUT_B64" | base64 -d 2>/dev/null || echo "")
          STDERR=$(echo "$STDERR_B64" | base64 -d 2>/dev/null || echo "")

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          COMMAND='${{ steps.read_cmd.outputs.command }}'

          # Write result.json safely via python
          python3 -c "
          import json, sys
          result = {
              'status': 'complete',
              'command': sys.argv[1],
              'stdout': sys.argv[2],
              'stderr': sys.argv[3],
              'returncode': int(sys.argv[4] or 0),
              'executed_at': sys.argv[5],
              'via': 'github-actions'
          }
          with open('result.json', 'w') as f:
              json.dump(result, f, indent=2)
          done = {'status': 'done', 'command': sys.argv[1]}
          with open('command.json', 'w') as f:
              json.dump(done, f, indent=2)
          print('Written result.json, returncode:', result['returncode'])
          " "$COMMAND" "$STDOUT" "$STDERR" "$RC" "$TIMESTAMP"

      - name: Commit and push result
        if: steps.read_cmd.outputs.status == 'pending'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.BRIDGE_TOKEN }}@github.com/apexmakeshop-dot/droplet-commands.git
          git add result.json command.json
          git diff --staged --quiet || git commit -m "bridge: result for '${{ steps.read_cmd.outputs.command }}'"
          git push
